<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Attack Distribution</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e1b4b;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .nav-link {
            display: inline-block;
            margin-top: 2rem;
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: #c084fc;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>📊 Attack Distribution</h1>
        <p>Overview of normal traffic vs various attack signatures</p>

        <!-- Make sure to generate the plot in your notebook so this image exists! -->
        <img src="{{ url_for('static', filename='plots/attack_distribution.svg') }}" alt="Attack Distribution Plot">

        <br>
        <a href="/" class="nav-link">← Back to Dashboard</a>
    </div>

</body>
</html>
